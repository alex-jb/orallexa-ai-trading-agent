name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard (Next.js UI)
        - API Server (FastAPI)
        - Engine (strategies/backtest)
        - ML Models
        - Desktop Agent
        - Evaluation Harness
        - New Component
    validations:
      required: true
