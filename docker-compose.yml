services:
  api:
    build: .
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./memory_data:/app/memory_data
      - ./results:/app/results
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/profile')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./orallexa-ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
